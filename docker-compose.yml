version: '3.9'

# ============================================================
# Pocket Monster Go — Production Docker Compose
# Runs directly from source code (no Docker build required)
# Usage: docker compose up -d
# ============================================================

services:

  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: pmg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pmg}
      POSTGRES_USER:     ${POSTGRES_USER:-pmg_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/V1__initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seeds/V2__seed_data.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
    networks:
      - pmg-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmg_user} -d ${POSTGRES_DB:-pmg}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: pmg-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - pmg-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Microservices (run from source via node:20-alpine) ──────
  user-service:
    image: node:20-alpine
    container_name: pmg-user-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app && npm install --prefix shared --omit=dev 2>/dev/null; cd /app/services/user-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8081"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  location-service:
    image: node:20-alpine
    container_name: pmg-location-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/location-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8082"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  pokemon-service:
    image: node:20-alpine
    container_name: pmg-pokemon-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/pokemon-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8083"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  catch-service:
    image: node:20-alpine
    container_name: pmg-catch-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/catch-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8084"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  gym-service:
    image: node:20-alpine
    container_name: pmg-gym-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/gym-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8085"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  social-service:
    image: node:20-alpine
    container_name: pmg-social-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/social-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8086"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  reward-service:
    image: node:20-alpine
    container_name: pmg-reward-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/reward-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8087"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  payment-service:
    image: node:20-alpine
    container_name: pmg-payment-service
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/services/payment-service && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8088"
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    networks: [pmg-internal]
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    image: node:20-alpine
    container_name: pmg-gateway
    restart: unless-stopped
    working_dir: /app
    volumes: [./backend:/app]
    command: sh -c "cd /app/gateway && npm install --omit=dev && node src/index.js"
    environment:
      PORT: "8080"
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      USER_SERVICE_URL:     http://user-service:8081
      LOCATION_SERVICE_URL: http://location-service:8082
      POKEMON_SERVICE_URL:  http://pokemon-service:8083
      CATCH_SERVICE_URL:    http://catch-service:8084
      GYM_SERVICE_URL:      http://gym-service:8085
      SOCIAL_SERVICE_URL:   http://social-service:8086
      REWARD_SERVICE_URL:   http://reward-service:8087
      PAYMENT_SERVICE_URL:  http://payment-service:8088
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks: [pmg-internal]
    depends_on:
      user-service:     {condition: service_healthy}
      location-service: {condition: service_healthy}
      catch-service:    {condition: service_healthy}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Admin Dashboard (nginx static) ────────────────────────────
  admin-dashboard:
    image: nginx:alpine
    container_name: pmg-admin
    restart: unless-stopped
    volumes:
      - ./frontend/admin-dashboard:/usr/share/nginx/html:ro
    ports:
      - "${ADMIN_PORT:-3000}:80"
    networks: [pmg-internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: pmg_postgres_data
  redis_data:
    name: pmg_redis_data

networks:
  pmg-internal:
    name: pmg_network
    driver: bridge
