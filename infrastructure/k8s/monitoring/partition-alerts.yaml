# infrastructure/k8s/monitoring/partition-alerts.yaml
# 数据库分区监控告警规则
# REQ-00323: 数据库分区表与大数据量表分区策略

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: partition-alerts
  namespace: monitoring
  labels:
    app: minego
    component: database
    release: prometheus
spec:
  groups:
  - name: partition.rules
    rules:
    - alert: PartitionSizeWarning
      expr: |
        pg_partition_size_bytes > 10737418240  # 10GB
      for: 1h
      labels:
        severity: warning
        component: database
      annotations:
        summary: "分区大小超过阈值"
        description: "分区 {{ $labels.partition_name }} 大小已超过 10GB，当前大小: {{ $value | humanizeBytes }}"
        runbook_url: "https://wiki.minego.com/runbooks/partition-size-warning"

    - alert: MissingCurrentMonthPartition
      expr: |
        pg_partition_exists{type="current_month"} == 0
      for: 5m
      labels:
        severity: critical
        component: database
      annotations:
        summary: "当前月份分区缺失"
        description: "表 {{ $labels.table_name }} 缺少当前月份的分区，可能导致数据插入失败"
        runbook_url: "https://wiki.minego.com/runbooks/missing-partition"

    - alert: MissingNextMonthPartition
      expr: |
        pg_partition_exists{type="next_month"} == 0
      for: 24h
      labels:
        severity: warning
        component: database
      annotations:
        summary: "下个月分区缺失"
        description: "表 {{ $labels.table_name }} 缺少下个月的分区，建议及时创建"
        runbook_url: "https://wiki.minego.com/runbooks/missing-partition"

    - alert: PartitionCleanupFailed
      expr: |
        increase(partition_cleanup_errors_total[1h]) > 0
      for: 5m
      labels:
        severity: warning
        component: database
      annotations:
        summary: "分区清理任务失败"
        description: "分区清理任务在过去1小时内失败 {{ $value }} 次"
        runbook_url: "https://wiki.minego.com/runbooks/partition-cleanup-failed"

    - alert: PartitionMigrationLag
      expr: |
        pg_partition_migration_lag_rows > 100000
      for: 30m
      labels:
        severity: warning
        component: database
      annotations:
        summary: "分区迁移延迟"
        description: "分区迁移延迟超过 100000 行，当前延迟: {{ $value }}"
        runbook_url: "https://wiki.minego.com/runbooks/partition-migration-lag"

    - alert: PartitionCountHigh
      expr: |
        pg_partition_count{table=~".*_partitioned"} > 20
      for: 1h
      labels:
        severity: info
        component: database
      annotations:
        summary: "分区数量过多"
        description: "表 {{ $labels.table }} 的分区数量超过 20 个，建议检查分区清理策略"

    - alert: PartitionTableSizeCritical
      expr: |
        pg_table_size_bytes{table=~".*_partitioned"} > 107374182400  # 100GB
      for: 30m
      labels:
        severity: critical
        component: database
      annotations:
        summary: "分区表总大小超过阈值"
        description: "分区表 {{ $labels.table }} 总大小已超过 100GB，当前大小: {{ $value | humanizeBytes }}"
        runbook_url: "https://wiki.minego.com/runbooks/partition-size-critical"

    - alert: PartitionPruningNotEffective
      expr: |
        rate(pg_partition_scans_total{pruning="false"}[5m]) > 10
      for: 15m
      labels:
        severity: warning
        component: database
      annotations:
        summary: "分区裁剪未生效"
        description: "检测到大量未使用分区裁剪的查询，可能影响性能"
        runbook_url: "https://wiki.minego.com/runbooks/partition-pruning"

---
# 分区监控指标采集配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: partition-monitoring-config
  namespace: monitoring
data:
  partition-monitor.sh: |
    #!/bin/bash
    
    # PostgreSQL 连接信息
    PGHOST="${PGHOST:-localhost}"
    PGPORT="${PGPORT:-5432}"
    PGDATABASE="${PGDATABASE:-minego}"
    PGUSER="${PGUSER:-monitor}"
    
    # 输出 Prometheus 指标格式
    echo "# HELP pg_partition_size_bytes Size of a specific partition in bytes"
    echo "# TYPE pg_partition_size_bytes gauge"
    
    # 查询所有分区大小
    psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -F'|' -c "
      SELECT 
        'pg_partition_size_bytes{partition_name=\"' || tablename || '\"} ' || 
        pg_total_relation_size('public.' || tablename)
      FROM pg_tables
      WHERE schemaname = 'public' AND tablename LIKE '%_y______'
    " | grep -v '^$'
    
    echo "# HELP pg_partition_exists Whether a partition exists (1) or not (0)"
    echo "# TYPE pg_partition_exists gauge"
    
    # 检查当前月份分区是否存在
    CURRENT_MONTH=$(date +"%Y_%m")
    for table in catch_records_partitioned battle_logs_partitioned user_activities_partitioned; do
      EXISTS=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c "
        SELECT COUNT(*) FROM pg_tables 
        WHERE tablename = '${table}_y${CURRENT_MONTH}'
      ")
      echo "pg_partition_exists{table=\"${table}\",type=\"current_month\"} ${EXISTS}"
    done
    
    # 检查下个月分区是否存在
    NEXT_MONTH=$(date -d "next month" +"%Y_%m" 2>/dev/null || date -v+1m +"%Y_%m")
    for table in catch_records_partitioned battle_logs_partitioned user_activities_partitioned; do
      EXISTS=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c "
        SELECT COUNT(*) FROM pg_tables 
        WHERE tablename = '${table}_y${NEXT_MONTH}'
      ")
      echo "pg_partition_exists{table=\"${table}\",type=\"next_month\"} ${EXISTS}"
    done
    
    echo "# HELP pg_partition_count Number of partitions for a table"
    echo "# TYPE pg_partition_count gauge"
    
    # 统计每个分区表的分区数量
    for table in catch_records_partitioned battle_logs_partitioned user_activities_partitioned pokemon_location_history_partitioned audit_logs_partitioned notifications_partitioned; do
      COUNT=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c "
        SELECT COUNT(*) FROM pg_tables 
        WHERE tablename LIKE '${table}_y______'
      ")
      echo "pg_partition_count{table=\"${table}\"} ${COUNT}"
    done
    
    echo "# HELP pg_partition_migration_lag_rows Number of rows pending migration"
    echo "# TYPE pg_partition_migration_lag_rows gauge"
    
    # 检查迁移延迟（如果有）
    # 这里假设有迁移状态表
    LAG=$(psql -h $PGHOST -p $PGPORT -U $PGUSER -d $PGDATABASE -t -A -c "
      SELECT COALESCE(SUM(lag_rows), 0) FROM partition_migration_status WHERE status = 'in_progress'
    " 2>/dev/null || echo "0")
    echo "pg_partition_migration_lag_rows ${LAG}"

---
# CronJob 用于定期采集分区指标
apiVersion: batch/v1
kind: CronJob
metadata:
  name: partition-monitor
  namespace: monitoring
spec:
  schedule: "*/5 * * * *"  # 每5分钟执行一次
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: partition-monitor
            image: postgres:15-alpine
            command:
            - /bin/sh
            - /scripts/partition-monitor.sh
            env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: host
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: "minego"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: user
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          volumes:
          - name: scripts
            configMap:
              name: partition-monitoring-config
          restartPolicy: OnFailure