# 多区域容灾切换配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: disaster-recovery-config
  namespace: minego-production
data:
  # 区域配置
  PRIMARY_REGION: "cn-east-1"
  SECONDARY_REGION: "cn-north-1"
  
  # 故障检测阈值
  HEALTH_CHECK_INTERVAL: "5s"
  HEALTH_CHECK_TIMEOUT: "3s"
  FAILURE_THRESHOLD: "3"
  RECOVERY_THRESHOLD: "2"
  
  # 切换配置
  AUTO_FAILOVER_ENABLED: "true"
  FAILOVER_COOLDOWN: "300s"
  DNS_TTL: "30s"
  
  # 数据同步配置
  DB_SYNC_MODE: "async"
  DB_SYNC_LAG_THRESHOLD: "60s"
  REDIS_SYNC_MODE: "async"
  
  # RTO/RPO 目标
  TARGET_RTO: "300s"
  TARGET_RPO: "60s"
---
# 主区域部署配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minego-gateway
  namespace: minego-production
  labels:
    app: minego-gateway
    region: primary
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: minego-gateway
  template:
    metadata:
      labels:
        app: minego-gateway
        region: primary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gateway
        image: minego/gateway:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: REGION
          value: "cn-east-1"
        - name: PRIMARY_REGION
          valueFrom:
            configMapKeyRef:
              name: disaster-recovery-config
              key: PRIMARY_REGION
        - name: SECONDARY_REGION
          valueFrom:
            configMapKeyRef:
              name: disaster-recovery-config
              key: SECONDARY_REGION
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials-primary
              key: url
        - name: DATABASE_URL_SECONDARY
          valueFrom:
            secretKeyRef:
              name: db-credentials-secondary
              key: url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: url
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
# 服务配置
apiVersion: v1
kind: Service
metadata:
  name: minego-gateway
  namespace: minego-production
  labels:
    app: minego-gateway
spec:
  type: LoadBalancer
  selector:
    app: minego-gateway
  ports:
  - port: 80
    targetPort: 8080
    name: http
---
# PodDisruptionBudget 确保最小可用副本
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minego-gateway-pdb
  namespace: minego-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: minego-gateway
---
# HorizontalPodAutoscaler 自动扩缩容
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: minego-gateway-hpa
  namespace: minego-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: minego-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
