# ============================================================
# PMG — Microservice Deployments & Services
# ============================================================

# ── Helper template macro (repeated per service) ─────────────
# Each service follows the same pattern:
#   Deployment (2 replicas, HPA-ready) + ClusterIP Service

---
# ── API Gateway ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pmg
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 3
  selector:
    matchLabels: { app: api-gateway }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: registry.cn-shanghai.aliyuncs.com/pmg/api-gateway:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 8080, name: http }]
          envFrom:
            - configMapRef: { name: pmg-config }
            - secretRef:    { name: pmg-secrets }
          env:
            - { name: PORT, value: "8080" }
            - { name: USER_SERVICE_URL,     value: "http://user-service:8081" }
            - { name: LOCATION_SERVICE_URL, value: "http://location-service:8082" }
            - { name: POKEMON_SERVICE_URL,  value: "http://pokemon-service:8083" }
            - { name: CATCH_SERVICE_URL,    value: "http://catch-service:8084" }
            - { name: GYM_SERVICE_URL,      value: "http://gym-service:8085" }
            - { name: SOCIAL_SERVICE_URL,   value: "http://social-service:8086" }
            - { name: REWARD_SERVICE_URL,   value: "http://reward-service:8087" }
            - { name: PAYMENT_SERVICE_URL,  value: "http://payment-service:8088" }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pmg
spec:
  selector: { app: api-gateway }
  ports: [{ port: 8080, targetPort: 8080, name: http }]

---
