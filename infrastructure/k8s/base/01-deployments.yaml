---
# ── Horizontal Pod Autoscalers ───────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: location-service-hpa
  namespace: pmg
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: location-service
  minReplicas: 4
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catch-service-hpa
  namespace: pmg
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catch-service
  minReplicas: 3
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }

---
# ── Ingress (ALB / Nginx) ─────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pmg-ingress
  namespace: pmg
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:    "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/use-regex:             "true"
    # WebSocket support for Raid
    nginx.ingress.kubernetes.io/proxy-http-version:    "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.pocketmonstergo.com]
      secretName: pmg-tls-secret
  rules:
    - host: api.pocketmonstergo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port: { number: 8080 }

---
# ── PodDisruptionBudgets ─────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: pmg
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: api-gateway }

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catch-service-pdb
  namespace: pmg
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: catch-service }
