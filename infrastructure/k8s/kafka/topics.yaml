# infrastructure/k8s/kafka/topics.yaml
# Kafka topics for mineGo event-driven architecture

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: catch-events
  namespace: minego
  labels:
    app: minego
    component: kafka
    topic-type: events
spec:
  partitions: 6
  replicas: 3
  config:
    # Retention: 7 days
    retention.ms: 604800000
    # Segment size: 500MB
    segment.bytes: 524288000
    # Cleanup policy: delete old messages
    cleanup.policy: delete
    # Minimum in-sync replicas
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: catch-events-dlq
  namespace: minego
  labels:
    app: minego
    component: kafka
    topic-type: dlq
spec:
  partitions: 1
  replicas: 3
  config:
    # Retention: 30 days (longer for DLQ)
    retention.ms: 2592000000
    # Segment size: 100MB
    segment.bytes: 104857600
    cleanup.policy: delete
    min.insync.replicas: 2
---
