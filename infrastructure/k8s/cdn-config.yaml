# CDN 配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-config
  namespace: minego
  labels:
    app: minego
    component: cdn
data:
  # CDN 开关
  CDN_ENABLED: "true"
  
  # CDN 提供商: cloudflare | aliyun | local
  CDN_PROVIDER: "cloudflare"
  
  # CDN 域名
  CDN_DOMAIN: "https://cdn.minego.example.com"
  
  # 源站 URL
  CDN_ORIGIN_URL: "https://api.minego.example.com"
  
  # 图片优化配置
  IMAGE_QUALITY_DEFAULT: "85"
  WEBP_ENABLED: "true"
  AVIF_ENABLED: "true"
  
  # 缓存配置（秒）
  CACHE_MAX_AGE_POKEMON: "31536000"      # 1 年
  CACHE_MAX_AGE_UI: "2592000"            # 30 天
  CACHE_MAX_AGE_DYNAMIC: "3600"          # 1 小时
  
  # 预设尺寸配置
  IMAGE_PRESET_THUMBNAIL: "64x64"
  IMAGE_PRESET_SMALL: "128x128"
  IMAGE_PRESET_MEDIUM: "256x256"
  IMAGE_PRESET_LARGE: "512x512"
  IMAGE_PRESET_HD: "1024x1024"

---
# CDN Secrets (需要手动创建)
# kubectl create secret generic cdn-secrets --from-literal=CDN_API_TOKEN=your-token --from-literal=CDN_ZONE_ID=your-zone-id -n minego
apiVersion: v1
kind: Secret
metadata:
  name: cdn-secrets
  namespace: minego
  labels:
    app: minego
    component: cdn
type: Opaque
data:
  # Base64 编码的值，请替换为实际值
  # CDN_API_TOKEN: <base64-encoded-token>
  # CDN_ZONE_ID: <base64-encoded-zone-id>
  placeholder: ""
