name: Deploy with Rollback

# ============================================================
# PMG — Enhanced CI/CD with Rolling Update & Auto Rollback
# Features:
#   - Zero-downtime deployment
#   - Health check validation
#   - Error rate monitoring
#   - Automatic rollback on failure
#   - Deployment history tracking
# ============================================================

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      force_reinstall:
        description: 'Force npm reinstall'
        type: boolean
        default: false
      skip_rollback:
        description: 'Skip auto-rollback on failure'
        type: boolean
        default: false
      monitor_duration:
        description: 'Monitoring duration (seconds)'
        type: number
        default: 300

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running deploy

env:
  DEPLOY_DIR: /data/mineGo
  ERROR_RATE_THRESHOLD: 0.05  # 5% error rate threshold
  MAX_ERROR_COUNT: 3          # Max consecutive errors before rollback

jobs:

  # ── Job 1: Unit Tests ────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test deps
        run: npm install jsonwebtoken --prefix /tmp/test-deps

      - name: catch.test.js
        working-directory: backend
        run: node tests/unit/catch.test.js

      - name: auth.test.js
        working-directory: backend
        run: NODE_PATH=/tmp/test-deps/node_modules node tests/unit/auth.test.js

      - name: spawn.test.js
        working-directory: backend
        run: node tests/unit/spawn.test.js

      - name: payment.test.js
        working-directory: backend
        run: node tests/unit/payment.test.js

  # ── Job 2: Deploy with Rollback ──────────────────────────────
  deploy:
    name: 🚀 Deploy (Rolling Update)
    needs: test
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - name: Deploy with health monitoring
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          port:        ${{ secrets.SSH_PORT }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/data/mineGo"
            FORCE_REINSTALL="${{ github.event.inputs.force_reinstall || 'false' }}"
            SKIP_ROLLBACK="${{ github.event.inputs.skip_rollback || 'false' }}"
            MONITOR_DURATION="${{ github.event.inputs.monitor_duration || '300' }}"
            COMMIT_SHA="${{ github.sha }}"
            SHORT_SHA="${COMMIT_SHA:0:7}"
            
            echo "╔══════════════════════════════════════════╗"
            echo "║  PMG Deploy with Rollback Support        ║"
            echo "║  $(date '+%Y-%m-%d %H:%M:%S')                      ║"
            echo "║  Commit: $SHORT_SHA                      ║"
            echo "╚══════════════════════════════════════════╝"
            
            cd "$DEPLOY_DIR"
            
            # ── Step 1: Pre-deployment backup ───────────────
            echo ""
            echo "▶ [1/7] Creating deployment backup..."
            DEPLOY_ID="deploy-$(date +%Y%m%d-%H%M%S)-$SHORT_SHA"
            echo "$DEPLOY_ID" > .deploy-current
            pm2 list --no-color > .deploy-history/$DEPLOY_ID-pm2-list.txt 2>&1 || true
            git log -1 --format='%H %s' > .deploy-history/$DEPLOY_ID-commit.txt
            echo "  ✓ Backup created: $DEPLOY_ID"
            
            # ── Step 2: Pull latest code ───────────────
            echo ""
            echo "▶ [2/7] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo "  ✓ At commit: $(git log -1 --format='%h %s')"
            
            # ── Step 3: Install dependencies ──────────
            echo ""
            echo "▶ [3/7] Installing npm dependencies..."
            cd backend
            
            if [ "$FORCE_REINSTALL" = "true" ]; then
              echo "  Force reinstall requested"
              rm -rf shared/node_modules gateway/node_modules services/*/node_modules
            fi
            
            # Install shared
            cd shared && npm install --omit=dev --prefer-offline 2>&1 | tail -2 && cd ..
            echo "  ✓ shared"
            
            # Install gateway
            cd gateway && npm install --omit=dev --prefer-offline 2>&1 | tail -2 && cd ..
            echo "  ✓ gateway"
            
            # Install each service
            for svc_dir in services/*/; do
              svc=$(basename "$svc_dir")
              cd "$svc_dir"
              npm install --omit=dev --prefer-offline 2>&1 | tail -1
              cd ../..
              echo "  ✓ $svc"
            done
            
            cd "$DEPLOY_DIR"
            
            # ── Step 4: Zero-downtime reload with PM2 ──
            echo ""
            echo "▶ [4/7] Reloading services with PM2 (rolling update)..."
            # startOrReload: 已存在的进程做零停机 reload，已死亡/被删除的进程重新拉起。
            # 此前用 pm2 reload，凡是不在进程列表里的服务（Process not found）永远不会被启动，
            # gateway 一旦死掉，后续每次部署的健康检查必然失败。
            pm2 startOrReload ecosystem.config.js --update-env
            echo "  ✓ PM2 startOrReload complete"
            pm2 save

            # ── Step 5: Health check ───────────────────
            echo ""
            echo "▶ [5/7] Health check..."
            MAX_WAIT=90
            ELAPSED=0
            HEALTH_CHECK_FAILED=true

            # 用 if 包裹 curl，避免 script_stop/set -e 在第一次探测失败时直接终止脚本
            # （此前 until 循环从未执行过第二次：首个 curl 退出码 22 即整个会话退出）
            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                HEALTH_CHECK_FAILED=false
                break
              fi
              sleep 5; ELAPSED=$((ELAPSED+5))
              echo "  Waiting... ${ELAPSED}s"
            done
            if [ "$HEALTH_CHECK_FAILED" = "true" ]; then
              echo "  ✗ Gateway not healthy after ${MAX_WAIT}s"
            fi
            
            if [ "$HEALTH_CHECK_FAILED" = "true" ]; then
              echo "  ✗ Health check failed"
              
              if [ "$SKIP_ROLLBACK" = "false" ]; then
                echo ""
                echo "▶ [ROLLBACK] Initiating automatic rollback..."
                pm2 resurrect
                echo "  ✓ Rollback complete"
              fi
              
              pm2 logs pmg-gateway --lines 20 --nostream
              exit 1
            fi
            
            HEALTH=$(curl -sf http://localhost:8080/health)
            echo "  ✓ Gateway healthy: $HEALTH"
            
            # ── Step 6: Monitor error rate ───────────────
            echo ""
            echo "▶ [6/7] Monitoring error rate for ${MONITOR_DURATION}s..."
            
            START_TIME=$(date +%s)
            ERROR_COUNT=0
            
            while true; do
              CURRENT_TIME=$(date +%s)
              ELAPSED=$((CURRENT_TIME - START_TIME))
              
              if [ $ELAPSED -ge $MONITOR_DURATION ]; then
                echo "  ✓ Monitoring complete (${MONITOR_DURATION}s)"
                break
              fi
              
              # Check health endpoint every 10 seconds
              sleep 10
              
              if ! curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                ERROR_COUNT=$((ERROR_COUNT + 1))
                echo "  ⚠️ Health check failed (count: $ERROR_COUNT)"
                
                if [ $ERROR_COUNT -ge 3 ]; then
                  echo "  ✗ Too many health check failures"
                  
                  if [ "$SKIP_ROLLBACK" = "false" ]; then
                    echo ""
                    echo "▶ [ROLLBACK] Initiating automatic rollback..."
                    pm2 resurrect
                    echo "  ✓ Rollback complete"
                  fi
                  
                  exit 1
                fi
              else
                ERROR_COUNT=0
              fi
              
              echo "  [${ELAPSED}s] Services healthy"
            done
            
            # ── Step 7: Save deployment record ───────────────
            echo ""
            echo "▶ [7/7] Saving deployment record..."
            echo "$DEPLOY_ID" > .deploy-current
            echo "$(date '+%Y-%m-%d %H:%M:%S') - $SHORT_SHA - SUCCESS" >> .deploy-history/deploy.log
            echo "  ✓ Deployment record saved"
            
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  ✅ Deploy complete!                      ║"
            echo "║  Commit: $SHORT_SHA                       ║"
            echo "║  Deploy ID: $DEPLOY_ID    ║"
            echo "╚══════════════════════════════════════════╝"
            pm2 list --no-color

      - name: Notify Slack on Success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "SLACK_WEBHOOK not configured, skipping"; exit 0; fi
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"✅ PMG Deploy SUCCESS\\nCommit: ${{ github.sha }}\\nBranch: ${{ github.ref }}\\nActor: ${{ github.actor }}\"}" || true

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "SLACK_WEBHOOK not configured, skipping"; exit 0; fi
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"text\":\"❌ PMG Deploy FAILED (rolled back)\\nCommit: ${{ github.sha }}\\nBranch: ${{ github.ref }}\\nActor: ${{ github.actor }}\"}" || true
