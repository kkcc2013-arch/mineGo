# Playwright E2E Tests
# 在每次 push 和 PR 时运行前端端到端测试

name: E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/game-client/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/game-client/**'
      - '.github/workflows/e2e-tests.yml'

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/game-client/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend/game-client
        run: |
          npm ci --prefer-offline
      
      - name: Install Playwright browsers
        working-directory: frontend/game-client
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Run E2E tests
        working-directory: frontend/game-client
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: frontend/game-client/playwright-report/
          retention-days: 30
      
      - name: Upload test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos-${{ matrix.browser }}
          path: frontend/game-client/test-results/
          retention-days: 7

  e2e-tests-mobile:
    name: Mobile E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/game-client/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend/game-client
        run: npm ci --prefer-offline
      
      - name: Install Playwright browsers
        working-directory: frontend/game-client
        run: npx playwright install --with-deps chromium webkit
      
      - name: Run mobile E2E tests
        working-directory: frontend/game-client
        run: npx playwright test --project=mobile-chrome --project=mobile-safari
        env:
          CI: true
      
      - name: Upload mobile test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile
          path: frontend/game-client/playwright-report/
          retention-days: 30

  e2e-summary:
    name: E2E Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-tests, e2e-tests-mobile]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.e2e-tests.result }}" == "failure" ]] || [[ "${{ needs.e2e-tests-mobile.result }}" == "failure" ]]; then
            echo "❌ Some E2E tests failed. Check the artifacts for details."
            exit 1
          else
            echo "✅ All E2E tests passed!"
          fi
      
      - name: Generate summary
        run: |
          echo "## E2E Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chromium | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Firefox | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| WebKit | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ needs.e2e-tests-mobile.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
