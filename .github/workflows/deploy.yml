name: Deploy to Server

# ============================================================
# PMG — CI/CD via SSH + PM2 (No Docker)
# Flow: Tests → SSH into server → git pull → npm install → pm2 reload
# ============================================================

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_reinstall:
        description: 'Force npm reinstall'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running deploy

jobs:

  # ── Job 1: Unit Tests ────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install test deps
        run: npm install jsonwebtoken --prefix /tmp/test-deps

      - name: catch.test.js
        working-directory: backend
        run: node tests/unit/catch.test.js

      - name: auth.test.js
        working-directory: backend
        run: NODE_PATH=/tmp/test-deps/node_modules node tests/unit/auth.test.js

      - name: spawn.test.js
        working-directory: backend
        run: node tests/unit/spawn.test.js

  # ── Job 2: Deploy via SSH + PM2 ──────────────────────────────
  deploy:
    name: 🚀 Deploy (SSH + PM2)
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Fix SSH key permissions & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SSH_HOST }}
          port:        ${{ secrets.SSH_PORT }}
          username:    ${{ secrets.SSH_USER }}
          key:         ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/data/mineGo"
            FORCE_REINSTALL="${{ github.event.inputs.force_reinstall || 'false' }}"
            COMMIT_SHA="${{ github.sha }}"
            SHORT_SHA="${COMMIT_SHA:0:7}"

            echo "╔══════════════════════════════════════════╗"
            echo "║  PMG Deploy — $(date '+%Y-%m-%d %H:%M:%S')    ║"
            echo "║  Commit: $SHORT_SHA                      ║"
            echo "╚══════════════════════════════════════════╝"

            cd "$DEPLOY_DIR"

            # ── Step 1: Pull latest code ───────────────
            echo ""
            echo "▶ [1/5] Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main
            echo "  ✓ At commit: $(git log -1 --format='%h %s')"

            # ── Step 2: Install dependencies ──────────
            echo ""
            echo "▶ [2/5] Installing npm dependencies..."
            cd backend

            if [ "$FORCE_REINSTALL" = "true" ]; then
              echo "  Force reinstall requested"
              rm -rf shared/node_modules gateway/node_modules services/*/node_modules
            fi

            # Install shared
            cd shared && npm install --omit=dev --prefer-offline 2>&1 | tail -2 && cd ..
            echo "  ✓ shared"

            # Install gateway
            cd gateway && npm install --omit=dev --prefer-offline 2>&1 | tail -2 && cd ..
            echo "  ✓ gateway"

            # Install each service
            for svc_dir in services/*/; do
              svc=$(basename "$svc_dir")
              cd "$svc_dir"
              npm install --omit=dev --prefer-offline 2>&1 | tail -1
              cd ../..
              echo "  ✓ $svc"
            done

            cd "$DEPLOY_DIR"

            # ── Step 3: Zero-downtime reload with PM2 ──
            echo ""
            echo "▶ [3/5] Reloading services with PM2..."
            if pm2 list | grep -q "pmg-"; then
              pm2 reload ecosystem.config.js --update-env
              echo "  ✓ PM2 reload complete"
            else
              echo "  First deploy — starting services..."
              pm2 start ecosystem.config.js
              echo "  ✓ PM2 start complete"
            fi
            pm2 save

            # ── Step 4: Health check ───────────────────
            echo ""
            echo "▶ [4/5] Health check..."
            MAX_WAIT=90
            ELAPSED=0
            until curl -sf http://localhost:8080/health > /dev/null 2>&1; do
              if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
                echo "  ✗ Gateway not healthy after ${MAX_WAIT}s"
                pm2 logs pmg-gateway --lines 20 --nostream
                exit 1
              fi
              sleep 5; ELAPSED=$((ELAPSED+5))
              echo "  Waiting... ${ELAPSED}s"
            done
            HEALTH=$(curl -sf http://localhost:8080/health)
            echo "  ✓ Gateway healthy: $HEALTH"


            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  ✅ Deploy complete!                      ║"
            echo "║  Commit: $SHORT_SHA                       ║"
            echo "╚══════════════════════════════════════════╝"
            pm2 list --no-color

