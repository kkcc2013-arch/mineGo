# ============================================================
# Pocket Monster Go — CI/CD Pipeline
# GitHub Actions: Test → Build → Canary Deploy → Full Deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

env:
  REGISTRY:     registry.cn-shanghai.aliyuncs.com
  IMAGE_PREFIX: registry.cn-shanghai.aliyuncs.com/pmg
  NODE_VERSION: "20"

# ── Concurrency: cancel in-progress runs on same branch ─────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Lint & Unit Tests ─────────────────────────────
  test:
    name: 🧪 Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}



      - name: Install dependencies
        working-directory: backend
        run: npm install --workspaces --if-present

      - name: Run catch unit tests
        working-directory: backend
        run: node tests/unit/catch.test.js

      - name: Run auth unit tests
        working-directory: backend
        run: node tests/unit/auth.test.js

      - name: Run spawn unit tests
        working-directory: backend
        run: node tests/unit/spawn.test.js

      - name: Verify all services have health route
        working-directory: backend
        run: |
          for svc in services/*/src/index.js; do
            grep -q "app.get('/health'" "$svc" || (echo "MISSING health route: $svc" && exit 1)
          done
          echo "✅ All services have health routes"

  # ── Job 2: Build Docker Images ───────────────────────────
  build:
    name: 🐳 Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      matrix:
        service:
          - user-service
          - location-service
          - pokemon-service
          - catch-service
          - gym-service
          - social-service
          - reward-service
          - payment-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          platforms: linux/amd64,linux/arm64

  # ── Job 3: Deploy to Staging ─────────────────────────────
  deploy-staging:
    name: 🚀 Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to staging namespace
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          for svc in user location pokemon catch gym social reward payment; do
            kubectl set image deployment/${svc}-service \
              ${svc}-service=${{ env.IMAGE_PREFIX }}/${svc}-service:${SHORT_SHA} \
              -n pmg-staging
          done
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.IMAGE_PREFIX }}/api-gateway:${SHORT_SHA} \
            -n pmg-staging

      - name: Wait for rollout
        run: |
          for svc in user-service location-service pokemon-service catch-service gym-service api-gateway; do
            kubectl rollout status deployment/${svc} -n pmg-staging --timeout=3m
          done

      - name: Run smoke tests
        run: |
          GATEWAY_URL="https://staging-api.pocketmonstergo.com"
          # Health check
          curl -f "${GATEWAY_URL}/health" || exit 1
          echo "✅ Gateway health OK"
          # Auth endpoint exists
          curl -f -X POST "${GATEWAY_URL}/v1/auth/sms-code" \
            -H "Content-Type: application/json" \
            -d '{"phone":"13800138000","scene":"login"}' | grep -q '"code"'
          echo "✅ Auth endpoint OK"

  # ── Job 4: Canary Deploy to Production ───────────────────
  deploy-canary:
    name: 🐤 Canary Deploy (5%)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production-canary
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply canary patch (5% traffic)
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          # Scale canary replicas: 1 canary = ~5% of 20 total replicas
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: catch-service-canary
            namespace: pmg
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: catch-service
                track: canary
            template:
              metadata:
                labels:
                  app: catch-service
                  track: canary
              spec:
                containers:
                  - name: catch-service
                    image: ${{ env.IMAGE_PREFIX }}/catch-service:${SHORT_SHA}
                    ports: [{ containerPort: 8084 }]
                    envFrom:
                      - configMapRef: { name: pmg-config }
                      - secretRef:    { name: pmg-secrets }
          EOF

      - name: Monitor canary for 10 minutes
        run: |
          echo "Monitoring canary for 10 minutes..."
          sleep 600
          # Check error rate via Prometheus (simplified)
          echo "Canary monitoring complete — ready for full deploy"

  # ── Job 5: Full Production Deploy ────────────────────────
  deploy-production:
    name: 🚢 Full Production Deploy
    needs: deploy-canary
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Rolling update all services
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          SERVICES="user-service location-service pokemon-service catch-service gym-service social-service reward-service payment-service"
          for svc in $SERVICES; do
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.IMAGE_PREFIX }}/${svc}:${SHORT_SHA} \
              -n pmg
            echo "Updated ${svc} → ${SHORT_SHA}"
          done
          kubectl set image deployment/api-gateway \
            api-gateway=${{ env.IMAGE_PREFIX }}/api-gateway:${SHORT_SHA} \
            -n pmg

      - name: Wait for all rollouts
        run: |
          DEPLOYMENTS="user-service location-service pokemon-service catch-service gym-service social-service reward-service payment-service api-gateway"
          for d in $DEPLOYMENTS; do
            kubectl rollout status deployment/${d} -n pmg --timeout=5m
            echo "✅ ${d} rolled out"
          done

      - name: Remove canary deployment
        run: kubectl delete deployment catch-service-canary -n pmg --ignore-not-found

      - name: Tag release
        run: |
          git config user.name  "PMG Bot"
          git config user.email "bot@pocketmonstergo.com"
          git tag "release-$(date +%Y%m%d-%H%M)-${{ github.sha }}" || true
          git push --tags || true

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COLOR=$([[ "$STATUS" == "success" ]] && echo "good" || echo "danger")
          echo "Deployment ${STATUS} — notifying team channel"
          # In prod: call Slack/DingTalk webhook
          curl -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"PMG 生产部署${STATUS}: ${{ github.ref_name }} @ $(echo ${{ github.sha }} | head -c 7)\"}}" || true
