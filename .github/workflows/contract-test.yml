name: API Contract Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'docs/schemas/**'
      - '.github/workflows/contract-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docs/schemas/**'

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: minego
          POSTGRES_PASSWORD: minego123
          POSTGRES_DB: minego_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Contract Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://minego:minego123@localhost:5432/minego_test
          REDIS_URL: redis://localhost:6379
          API_BASE_URL: http://localhost:3000
        run: |
          # 启动服务（后台）
          npm run start:test &
          
          # 等待服务启动
          sleep 10
          
          # 运行合约测试
          npm run test:contract || true
          
          # 生成报告
          npm run test:contract:report || true

      - name: Upload Contract Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-report
          path: reports/contract-test-report.json
          retention-days: 30

      - name: Check Contract Test Results
        run: |
          if [ -f reports/contract-test-report.json ]; then
            PASS_RATE=$(jq -r '.summary.passRate' reports/contract-test-report.json)
            echo "Contract test pass rate: $PASS_RATE%"
            
            # 如果通过率低于 80%，则失败
            if [ "$(echo "$PASS_RATE < 80" | bc)" -eq 1 ]; then
              echo "Contract test pass rate is below 80%"
              exit 1
            fi
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('reports/contract-test-report.json')) {
              const report = JSON.parse(fs.readFileSync('reports/contract-test-report.json', 'utf8'));
              const summary = report.summary;
              
              const comment = `## 📋 Contract Test Results
              
              | Metric | Value |
              |--------|-------|
              | **Total Tests** | ${summary.total} |
              | **Passed** | ${summary.passed} ✅ |
              | **Failed** | ${summary.failed} ❌ |
              | **Pass Rate** | ${summary.passRate}% |
              | **Duration** | ${summary.duration}s |
              
              ${summary.failed > 0 ? '### ⚠️ Breaking Changes Detected\n\nPlease review the contract test failures before merging.' : '### ✅ All contract tests passed!'}
              `;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  schema-validation:
    runs-on: ubuntu-latest
    needs: contract-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Schema Definitions
        run: |
          echo "Validating schema definitions..."
          
          # 检查所有 Schema 文件是否符合规范
          for schema_file in docs/schemas/*.schema.json; do
            if [ -f "$schema_file" ]; then
              echo "Validating $schema_file"
              
              # 检查必需字段
              if ! jq -e '.["$schema"]' "$schema_file" > /dev/null; then
                echo "Error: $schema_file missing \$schema field"
                exit 1
              fi
              
              if ! jq -e '.type' "$schema_file" > /dev/null; then
                echo "Error: $schema_file missing type field"
                exit 1
              fi
              
              echo "✓ $schema_file is valid"
            fi
          done

      - name: Check for Breaking Changes
        run: |
          echo "Checking for breaking changes in schemas..."
          
          # 如果有旧的 Schema，对比差异
          if [ -d "docs/schemas/previous" ]; then
            echo "Comparing with previous schema versions..."
            
            for new_schema in docs/schemas/*.schema.json; do
              schema_name=$(basename "$new_schema")
              old_schema="docs/schemas/previous/$schema_name"
              
              if [ -f "$old_schema" ]; then
                echo "Comparing $schema_name..."
                # 这里可以添加更详细的对比逻辑
              fi
            done
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [contract-tests, schema-validation]
    if: failure()
    
    steps:
      - name: Notify on failure
        run: |
          echo "Contract tests failed. Please review the test results."
          # 可以在这里添加 Slack/Email 通知逻辑