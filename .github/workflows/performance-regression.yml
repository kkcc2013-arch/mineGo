name: Performance Regression Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      endpoints:
        description: 'API endpoints to test (comma-separated, or "all")'
        required: false
        default: 'all'
      iterations:
        description: 'Number of test iterations per endpoint'
        required: false
        default: '50'
      threshold:
        description: 'Regression threshold percentage'
        required: false
        default: '20'

jobs:
  performance-regression:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: minego_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      
      - name: Setup test database
        run: |
          npm run db:migrate:test
          npm run db:seed:test
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test123@localhost:5432/minego_test
      
      - name: Create performance tables
        run: |
          PGPASSWORD=test123 psql -h localhost -U test -d minego_test -f database/migrations/20260708_010800_performance_regression_tables.sql
        env:
          PGPASSWORD: test123
      
      - name: Run performance regression tests
        id: perf-test
        run: |
          node tests/regression/run-regression-tests.js \
            --endpoints="${{ github.event.inputs.endpoints || 'all' }}" \
            --iterations="${{ github.event.inputs.iterations || 50 }}" \
            --threshold="${{ github.event.inputs.threshold || 20 }}"
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test123@localhost:5432/minego_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      
      - name: Generate performance report
        if: always()
        run: |
          node tests/regression/generate-performance-report.js
        working-directory: backend
        env:
          DATABASE_URL: postgres://test:test123@localhost:5432/minego_test
      
      - name: Upload performance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-regression-report
          path: |
            backend/test-results/performance/
            backend/performance-report.md
          retention-days: 30
      
      - name: Comment on PR (if regression detected)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('backend/performance-report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## ⚠️ Performance Regression Detected\n\n${report}`
              });
            } catch (e) {
              console.log('Report not found, skipping comment');
            }
      
      - name: Update baseline (on main branch push)
        if: success() && github.ref == 'refs/heads/main'
        run: |
          node tests/regression/update-baselines.js
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
      
      - name: Notify on Slack (if critical regression)
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "⚠️ Performance Regression Detected in ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Performance Regression Alert*\n\nRepository: ${{ github.repository }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\n\nCheck the workflow for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # 单元测试任务
  unit-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: backend
      
      - name: Run unit tests
        run: npm test -- tests/unit/performanceRegressionTester.test.js
        working-directory: backend
        env:
          NODE_ENV: test
      
      - name: Check test coverage
        run: npm run coverage -- tests/unit/performanceRegressionTester.test.js
        working-directory: backend
        env:
          NODE_ENV: test
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 30